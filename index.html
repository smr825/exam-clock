<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주여자상업고등학교 시험 시계</title>
    <style>
        /* 기본 리셋 및 폰트 설정 (가독성을 위한 굵은 고딕 계열) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            font-weight: 700;
        }

        body {
            background-color: #0f172a; /* 눈이 편안한 짙은 네이비/블랙 배경 */
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단 헤더 영역 (20% 높이) */
        .header {
            flex: 0 0 20vh;
            background-color: #1e3a8a;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 5px solid #3b82f6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .header h1 {
            font-size: clamp(60px, 6vw, 90px); /* 최소 60px 이상 */
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 2. 중앙 컨텐츠 영역 (50% 높이, 60:40 레이아웃) */
        .main-container {
            flex: 0 0 55vh; /* 일정과 유의사항을 위로 당기기 위해 높이를 약간 늘림 */
            display: flex;
            width: 100%;
        }

        /* 좌측 열 - 시계 (60% 너비, 화면 위에서 1/3 지점에 오도록 정렬) */
        .clock-section {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 8vh; /* 위에서 1/3 위치 조정 */
            border-right: 2px solid #334155;
        }
        .kst-label {
            font-size: clamp(40px, 3vw, 50px);
            color: #60a5fa;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .date-display {
            font-size: clamp(55px, 4vw, 65px);
            color: #cbd5e1;
            margin-bottom: 15px;
        }
        .time-display {
            font-size: clamp(160px, 13vw, 220px); /* 150px 이상 초대형 폰트 */
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.4);
            font-variant-numeric: tabular-nums; /* 숫자 너비 고정으로 깜빡임 방지 */
        }
        .status-display {
            margin-top: 25px;
            font-size: 45px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px 40px;
            border-radius: 20px;
            border: 2px solid #475569;
            text-align: center;
            line-height: 1.3;
        }
        .highlight-time {
            color: #fbbf24;
            font-weight: 900;
        }

        /* 우측 열 - 일정표 (40% 너비, 패딩/마진 최소화하여 위로 밀착) */
        .schedule-section {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 상단 밀착 */
            padding: 2vh 40px 0 40px;
        }
        .schedule-title {
            font-size: 40px;
            color: #34d399;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 3px solid #059669;
            text-align: center;
        }
        .schedule-item {
            background-color: #1e293b;
            margin-bottom: 6px; /* 마진 최소화 */
            padding: 8px 15px; /* 패딩 최소화 */
            border-radius: 8px;
            border-left: 6px solid #475569;
            transition: all 0.3s ease;
        }
        .schedule-item.active {
            background-color: #334155;
            border-left-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            transform: scale(1.02);
        }
        .schedule-period {
            font-size: 30px;
            color: #94a3b8;
            margin-bottom: 2px;
        }
        .schedule-detail {
            font-size: 32px;
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }
        .eval-highlight {
            color: #fbbf24;
            font-size: 38px; /* 평가 시간 크게 */
            font-weight: 900;
        }

        /* 3. 하단 영역 - 유의사항 (25% 높이, 중앙 영역 바로 아래 밀착) */
        .notice-section {
            flex: 0 0 25vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 상단 밀착 */
            padding-top: 10px; /* 여백 대폭 축소 */
        }
        .notice-box {
            width: 85%;
            background-color: rgba(220, 38, 38, 0.15);
            border: 3px solid #ef4444;
            border-radius: 12px;
            padding: 15px 30px; /* 패딩 축소 */
        }
        .notice-title {
            font-size: 32px;
            color: #fca5a5;
            margin-bottom: 8px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .notice-list {
            list-style: none;
            text-align: left;
        }
        .notice-list li {
            font-size: 28px;
            color: #f8fafc;
            margin-bottom: 4px;
            padding-left: 30px;
            position: relative;
        }
        .notice-list li::before {
            content: '🚫';
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 24px;
        }
        
        /* 알림음 활성화를 위한 안내문 */
        #audio-init-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            color: #aaa;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="audio-init-overlay" onclick="initAudio()">🔊 알림음을 켜려면 화면을 한 번 클릭하세요</div>

    <div class="header">
        <h1>전주여자상업고등학교 1학기 1차 시험</h1>
    </div>

    <div class="main-container">
        
        <div class="clock-section">
            <div class="kst-label">한국표준시</div>
            <div class="date-display" id="date">YYYY년 MM월 DD일 요일</div>
            <div class="time-display" id="time">00:00:00</div>
            
            <div class="status-display" id="status-box">
                <span id="current-period-name">시험 대기 중</span><br>
                <span id="remaining-time" class="highlight-time">--:--</span>
            </div>
        </div>

        <div class="schedule-section">
            <div class="schedule-title">오늘의 시험 일정</div>
            
            <div class="schedule-item" id="p1">
                <div class="schedule-period">1교시</div>
                <div class="schedule-detail"><span>준 비</span><span>08:45 ~ 08:50</span></div>
                <div class="schedule-detail eval-highlight"><span>평 가</span><span>08:50 ~ 09:40</span></div>
            </div>
            
            <div class="schedule-item" id="p2">
                <div class="schedule-period">2교시</div>
                <div class="schedule-detail eval-highlight"><span>자율학습</span><span>09:55 ~ 10:50</span></div>
            </div>
            
            <div class="schedule-item" id="p3">
                <div class="schedule-period">3교시</div>
                <div class="schedule-detail"><span>준 비</span><span>11:05 ~ 11:10</span></div>
                <div class="schedule-detail eval-highlight"><span>평 가</span><span>11:10 ~ 12:00</span></div>
            </div>
        </div>
    </div>

    <div class="notice-section">
        <div class="notice-box">
            <div class="notice-title">⚠️ 시험 중 유의사항</div>
            <ul class="notice-list">
                <li>전자기기 소지 금지 (소지 시 부정행위로 간주됨)</li>
                <li>부정행위 적발 시 해당 과목 0점 처리</li>
            </ul>
        </div>
    </div>

    <script>
        // 시간 데이터를 초 단위로 변환하는 함수 (비교용)
        function timeToSeconds(timeStr) {
            const [h, m] = timeStr.split(':');
            return parseInt(h) * 3600 + parseInt(m) * 60;
        }

        // 시험 일정 데이터 정의
        const scheduleData = [
            { id: "p1", name: "1교시 준비", start: timeToSeconds("08:45"), end: timeToSeconds("08:50"), isEval: false },
            { id: "p1", name: "1교시 평가", start: timeToSeconds("08:50"), end: timeToSeconds("09:40"), isEval: true },
            { id: null, name: "쉬는 시간", start: timeToSeconds("09:40"), end: timeToSeconds("09:55"), isEval: false },
            { id: "p2", name: "2교시 자율학습", start: timeToSeconds("09:55"), end: timeToSeconds("10:50"), isEval: true },
            { id: null, name: "쉬는 시간", start: timeToSeconds("10:50"), end: timeToSeconds("11:05"), isEval: false },
            { id: "p3", name: "3교시 준비", start: timeToSeconds("11:05"), end: timeToSeconds("11:10"), isEval: false },
            { id: "p3", name: "3교시 평가", start: timeToSeconds("11:10"), end: timeToSeconds("12:00"), isEval: true }
        ];

        let audioCtx = null;
        let previousStateName = null;

        // 웹 오디오 API를 이용한 알림음 생성 (외부 파일 불필요)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audio-init-overlay').style.display = 'none';
            }
        }

        function playBeep() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 880Hz (A5음)
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // 시계 및 일정 업데이트 메인 함수
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 시계 텍스트 업데이트
            document.getElementById('time').innerText = `${hours}:${minutes}:${seconds}`;

            // 날짜 업데이트
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const day = days[now.getDay()];
            document.getElementById('date').innerText = `${year}년 ${month}월 ${date}일 ${day}요일`;

            // 현재 상태 계산
            const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            let currentState = null;

            for (let i = 0; i < scheduleData.length; i++) {
                if (currentSeconds >= scheduleData[i].start && currentSeconds < scheduleData[i].end) {
                    currentState = scheduleData[i];
                    break;
                }
            }

            // 모든 하이라이트 초기화
            document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('active'));

            if (currentState) {
                // 현재 진행중인 교시 배경 하이라이트
                if (currentState.id) {
                    document.getElementById(currentState.id).classList.add('active');
                }

                // 남은 시간 계산 (분:초)
                const remainSec = currentState.end - currentSeconds;
                const rMin = String(Math.floor(remainSec / 60)).padStart(2, '0');
                const rSec = String(remainSec % 60).padStart(2, '0');

                document.getElementById('current-period-name').innerText = `${currentState.name} 진행 중`;
                document.getElementById('remaining-time').innerText = `남은 시간 ${rMin}:${rSec}`;
                document.getElementById('remaining-time').style.color = currentState.isEval ? '#ef4444' : '#fbbf24';

                // 교시가 바뀌었을 때 알림음 재생
                if (previousStateName !== currentState.name) {
                    if (previousStateName !== null) playBeep();
                    previousStateName = currentState.name;
                }
            } else {
                if (currentSeconds < scheduleData[0].start) {
                    document.getElementById('current-period-name').innerText = "시험 대기 중";
                } else {
                    document.getElementById('current-period-name').innerText = "모든 일정 종료";
                }
                document.getElementById('remaining-time').innerText = "--:--";
                previousStateName = null;
            }
        }

        // 1초마다 업데이트 실행
        setInterval(updateClock, 1000);
        updateClock(); // 초기 즉시 실행
    </script>
</body>
</html>
