<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주여자상업고등학교 1학기 1차 시험 시계</title>
    <style>
        /* 폰트 설정: 가독성이 좋은 Noto Sans KR 사용 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0F172A;       /* 매우 어두운 네이비 */
            --header-bg: #1E293B;      /* 헤더 배경 */
            --text-main: #FFFFFF;      /* 메인 텍스트 */
            --text-accent: #FFD700;    /* 강조 텍스트 (금색) */
            --highlight-bg: #EAB308;   /* 현재 교시 강조 배경 (진한 노랑) */
            --highlight-text: #000000; /* 강조 시 텍스트 색상 */
            --border-color: #334155;
            --clock-color: #00FFEA;    /* 시계 숫자 색상 (형광 시안) */
        }

        /* 86인치 4K 해상도 대응을 위한 기본 폰트 사이즈 설정 */
        html {
            font-size: 1vw; /* 화면 너비의 1%를 기본 1rem으로 설정 (반응형) */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 스크롤 완전 차단 */
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단 영역 (헤더) - 20vh 고정 */
        header {
            height: 20vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--header-bg);
            border-bottom: 0.4vh solid var(--text-accent);
            box-shadow: 0 1vh 2vh rgba(0,0,0,0.5);
            z-index: 10;
        }

        h1 {
            font-size: 4.5rem; /* 매우 큰 폰트 (최소 60px 이상 보장) */
            font-weight: 900;
            letter-spacing: -0.1rem;
            color: var(--text-main);
            text-shadow: 0.3rem 0.3rem 0.5rem rgba(0,0,0,0.6);
        }

        /* 2. 중앙 영역 (메인 콘텐츠) - 55vh 고정 (유의사항을 위로 당기기 위해 50%보다 약간 늘림) */
        main {
            height: 55vh;
            display: flex;
            width: 100%;
        }

        /* 좌측 열: 시험 시간표 (40% 너비) */
        .schedule-section {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 상단 밀착 */
            padding: 2vh 2vw 0 2vw; /* 마진/패딩 최소화 */
            border-right: 0.2vh solid var(--border-color);
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #34d399;
            margin-bottom: 1.5vh;
            text-align: center;
            border-bottom: 0.3vh solid #059669;
            padding-bottom: 1vh;
            flex-shrink: 0;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 1vh; /* 항목 간 간격 최소화 */
        }

        .schedule-item {
            display: grid;
            grid-template-columns: 1fr 3fr;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 1.2vh 1.5vw; /* 패딩을 줄여 컴팩트하게 */
            border-radius: 1vh;
            border-left: 0.5vh solid #475569;
            transition: all 0.3s ease;
        }

        .period-name {
            font-size: 2rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .period-times {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 1.5vw;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.3vh;
        }
        
        .time-row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 1.4rem;
            color: #cbd5e1;
            margin-right: 1vw;
        }

        .time {
            font-size: 1.6rem;
            font-weight: 500;
        }

        .exam-time {
            font-size: 2.4rem; /* 본 령 / 자율학습 시간 눈에 띄게 더 크게 */
            font-weight: 900;
            color: var(--text-main);
        }

        /* 현재 진행중인 교시 강조 스타일 */
        .schedule-item.active {
            background-color: var(--highlight-bg);
            border-left: 0.6vh solid #FFFFFF;
            transform: scale(1.02);
            box-shadow: 0 0.5vh 1.5vh rgba(234, 179, 8, 0.4);
        }
        
        .schedule-item.active .period-name,
        .schedule-item.active .label,
        .schedule-item.active .time {
            color: var(--highlight-text);
            font-weight: 900;
        }

        /* 우측 열: 시계 영역 (60% 너비) */
        .clock-section {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 8vh; /* 위에서 1/3 위치 조정 */
            position: relative;
        }

        .timezone-label {
            font-size: 2.2rem; /* 40px 이상 */
            color: #60a5fa;
            margin-bottom: 1vh;
            letter-spacing: 0.2rem;
        }

        .date-display {
            font-size: 3rem; /* 50px 이상 */
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 1vh;
        }

        .time-display {
            font-size: 13vw; /* 화면 너비의 13% = 초대형 폰트 (150px 이상 가뿐히 보장) */
            font-weight: 900;
            color: var(--clock-color);
            line-height: 1;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -0.5rem;
            text-shadow: 0 0 2vh rgba(0, 255, 234, 0.4);
            font-variant-numeric: tabular-nums;
        }

        .current-status-message {
            margin-top: 3vh;
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            padding: 1.5vh 3vw;
            border-radius: 1.5vh;
            background-color: rgba(0, 0, 0, 0.5);
            border: 0.2vh solid #475569;
            text-align: center;
            line-height: 1.4;
        }

        /* 3. 하단 영역 (유의사항) - 25vh 고정 */
        footer {
            height: 25vh;
            background-color: rgba(220, 38, 38, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 상단 여백 축소하여 위로 많이 끌어올림 */
            padding-top: 2vh; /* 패딩 20px 이하 체감 */
            border-top: 0.4vh solid #ef4444;
        }

        .footer-content {
            width: 85%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 0.2vh solid #ef4444;
            border-radius: 1vh;
            padding: 1.5vh 3vw;
        }

        .footer-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fca5a5;
            margin-bottom: 0.5vh;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .footer-title::before {
            content: '⚠️ ';
            margin-right: 0.5vw;
        }

        .footer-items {
            display: flex;
            flex-direction: column;
            font-size: 1.8rem; /* 약 28px 체감 */
            color: #f8fafc;
            text-align: left;
            padding-left: 2vw;
            gap: 0.5vh;
        }

        .footer-item {
            position: relative;
        }

        .footer-item::before {
            content: '🚫';
            position: absolute;
            left: -1.8vw;
            top: 0.2vh;
            font-size: 1.5rem;
        }

        /* 알림음 활성화 안내 오버레이 */
        #audio-init-overlay {
            position: fixed;
            bottom: 2vh;
            right: 2vw;
            background: rgba(0,0,0,0.8);
            padding: 1vh 2vw;
            border-radius: 1vh;
            font-size: 1.2rem;
            color: #aaa;
            cursor: pointer;
            z-index: 1000;
            border: 0.1vh solid #555;
        }

    </style>
</head>
<body>

    <div id="audio-init-overlay" onclick="initAudio()">🔊 알림음을 켜려면 화면을 한 번 클릭하세요</div>

    <header>
        <h1>전주여자상업고등학교 1학기 1차 시험</h1>
    </header>

    <main>
        <section class="schedule-section">
            <div class="section-title">시험 시간</div>
            <div class="schedule-list">
                <div class="schedule-item" id="period-1">
                    <div class="period-name">1교시</div>
                    <div class="period-times">
                        <div class="time-row">
                            <span class="label">준&nbsp;&nbsp;비</span>
                            <span class="time">08:45 ~ 08:50</span>
                        </div>
                        <div class="time-row">
                            <span class="label">본&nbsp;&nbsp;령</span>
                            <span class="time exam-time">08:50 ~ 09:40</span>
                        </div>
                    </div>
                </div>

                <div class="schedule-item" id="period-2">
                    <div class="period-name">2교시</div>
                    <div class="period-times">
                        <div class="time-row">
                            <span class="label">자율학습</span>
                            <span class="time exam-time">09:55 ~ 10:50</span>
                        </div>
                    </div>
                </div>

                <div class="schedule-item" id="period-3">
                    <div class="period-name">3교시</div>
                    <div class="period-times">
                        <div class="time-row">
                            <span class="label">준&nbsp;&nbsp;비</span>
                            <span class="time">11:05 ~ 11:10</span>
                        </div>
                        <div class="time-row">
                            <span class="label">본&nbsp;&nbsp;령</span>
                            <span class="time exam-time">11:10 ~ 12:00</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="clock-section">
            <div class="timezone-label">한국표준시</div>
            <div class="date-display" id="date-display">YYYY년 MM월 DD일 요일</div>
            <div class="time-display" id="time-display">00:00:00</div>
            <div class="current-status-message" id="status-message">시험 대기 중</div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-title">시험 중 유의사항</div>
            <div class="footer-items">
                <div class="footer-item">전자기기 소지 금지 (부정행위로 간주됨)</div>
                <div class="footer-item">부정행위 적발 시 0점 처리</div>
            </div>
        </div>
    </footer>

    <script>
        let audioCtx = null;
        let previousStatus = null;

        // 웹 오디오 API 알림음 초기화
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audio-init-overlay').style.display = 'none';
            }
        }

        // 알림음 재생 함수
        function playBeep() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5음
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // 시간 데이터를 초로 변환
        function timeToSec(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 3600 + m * 60;
        }

        // 시험 일정 세부 데이터 (초 단위 변환)
        const schedules = [
            { id: 'period-1', name: '1교시 준비', type: 'prep', start: timeToSec('08:45'), end: timeToSec('08:50') },
            { id: 'period-1', name: '1교시 본령', type: 'exam', start: timeToSec('08:50'), end: timeToSec('09:40') },
            { id: null, name: '쉬는 시간', type: 'break', start: timeToSec('09:40'), end: timeToSec('09:55') },
            { id: 'period-2', name: '2교시 자율학습', type: 'exam', start: timeToSec('09:55'), end: timeToSec('10:50') },
            { id: null, name: '쉬는 시간', type: 'break', start: timeToSec('10:50'), end: timeToSec('11:05') },
            { id: 'period-3', name: '3교시 준비', type: 'prep', start: timeToSec('11:05'), end: timeToSec('11:10') },
            { id: 'period-3', name: '3교시 본령', type: 'exam', start: timeToSec('11:10'), end: timeToSec('12:00') }
        ];

        function updateClock() {
            const now = new Date();

            // 1. 날짜 업데이트
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekDay = weekDays[now.getDay()];
            document.getElementById('date-display').innerText = `${year}년 ${month}월 ${day}일 ${weekDay}요일`;

            // 2. 시간 업데이트
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time-display').innerText = `${hours}:${minutes}:${seconds}`;

            // 3. 상태 계산
            const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            let currentSchedule = null;

            for (let s of schedules) {
                if (currentSeconds >= s.start && currentSeconds < s.end) {
                    currentSchedule = s;
                    break;
                }
            }

            // 하이라이트 초기화
            document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('active'));
            let statusMessage = "시험 대기 중 (1교시 준비 08:45 시작)";
            let statusColor = "#FFFFFF";

            if (currentSchedule) {
                // 남은 시간 계산
                const remainSecTotal = currentSchedule.end - currentSeconds;
                const rMin = Math.floor(remainSecTotal / 60);
                const rSec = remainSecTotal % 60;
                const remainText = `${String(rMin).padStart(2, '0')}분 ${String(rSec).padStart(2, '0')}초`;

                if (currentSchedule.id) {
                    document.getElementById(currentSchedule.id).classList.add('active');
                }

                if (currentSchedule.type === 'prep') {
                    statusMessage = `<span style="color:#FFD700">${currentSchedule.name} 중</span><br>본령 시작까지 남은 시간: ${remainText}`;
                } else if (currentSchedule.type === 'exam') {
                    statusMessage = `<span style="color:#00FFEA">${currentSchedule.name} 진행 중</span><br>종료까지 남은 시간: <span style="color:#ef4444">${remainText}</span>`;
                } else if (currentSchedule.type === 'break') {
                    statusMessage = `<span style="color:#94a3b8">${currentSchedule.name}</span><br>다음 시간까지: ${remainText}`;
                }

                // 상태 변경 시 알림음 재생
                if (previousStatus !== currentSchedule.name) {
                    if (previousStatus !== null) playBeep();
                    previousStatus = currentSchedule.name;
                }
            } else {
                if (currentSeconds >= schedules[schedules.length - 1].end) {
                    statusMessage = "오늘의 모든 시험 일정이 종료되었습니다.";
                }
                previousStatus = null;
            }

            document.getElementById('status-message').innerHTML = statusMessage;
        }

        // 1초마다 시계 업데이트
        setInterval(updateClock, 1000);
        updateClock(); // 로딩 즉시 실행

    </script>
</body>
</html>
